server:
  port: ${SERVER_PORT:18089}

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DB:lingyi}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${DASHSCOPE_VISION_MODEL:qwen-vl-max}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

lingyi:
  minio:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:lingyi-ai}
    public-base-url: ${MINIO_PUBLIC_BASE_URL}
  ai:
    diagnosis:
      defaults:
        prompt-code: ${LINGYI_DIAGNOSIS_PROMPT_CODE:diagnosis-default-v1}
        model: ${DASHSCOPE_VISION_MODEL:qwen-vl-max}
        temperature: ${LINGYI_DIAGNOSIS_TEMPERATURE:0.2}
        top-p: ${LINGYI_DIAGNOSIS_TOP_P:0.8}

