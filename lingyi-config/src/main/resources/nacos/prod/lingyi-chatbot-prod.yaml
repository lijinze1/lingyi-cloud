server:
  port: ${SERVER_PORT:18088}

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DB:lingyi}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

lingyi:
  ai:
    chat:
      defaults:
        prompt-code: ${LINGYI_CHAT_PROMPT_CODE:chatbot-default-v1}
        model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}
        temperature: ${LINGYI_CHAT_TEMPERATURE:0.2}
        top-p: ${LINGYI_CHAT_TOP_P:0.8}

