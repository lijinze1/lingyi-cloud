server:
  port: ${SERVER_PORT:18087}

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DB:lingyi}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST}
        port: ${QDRANT_PORT:6334}
        use-tls: ${QDRANT_USE_TLS:true}
        api-key: ${QDRANT_API_KEY}
        collection-name: ${QDRANT_COLLECTION:lingyi_ai_kb_chunk_v1}
        initialize-schema: ${QDRANT_INITIALIZE_SCHEMA:true}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

lingyi:
  minio:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:lingyi-ai}
    public-base-url: ${MINIO_PUBLIC_BASE_URL}
  ai:
    rag:
      defaults:
        embedding-model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
        supported-file-types: ${LINGYI_RAG_SUPPORTED_TYPES:txt,md,pdf,docx}

