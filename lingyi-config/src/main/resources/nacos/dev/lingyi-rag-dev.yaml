server:
  port: ${SERVER_PORT:18087}

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:lingyi}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:}
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:aeb5e582-fb94-4c61-be5b-975de7b2325e.us-east4-0.gcp.cloud.qdrant.io}
        port: ${QDRANT_PORT:6334}
        use-tls: ${QDRANT_USE_TLS:true}
        api-key: ${QDRANT_API_KEY:}
        collection-name: ${QDRANT_COLLECTION:lingyi_ai_kb_chunk_v1}
        initialize-schema: ${QDRANT_INITIALIZE_SCHEMA:true}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

lingyi:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:lingyi-ai}
    public-base-url: ${MINIO_PUBLIC_BASE_URL:http://127.0.0.1:9000/lingyi-ai}
  ai:
    rag:
      defaults:
        embedding-model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
        supported-file-types: ${LINGYI_RAG_SUPPORTED_TYPES:txt,md,pdf,docx}

