server:
  port: ${SERVER_PORT:18088}

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:lingyi}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  packages-to-scan: com.lingyi.service.seckill.controller

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:lingyi-seckill-producer}
    send-message-timeout: ${ROCKETMQ_SEND_TIMEOUT:3000}

lingyi:
  seckill:
    async-mode: ${LINGYI_SECKILL_ASYNC_MODE:local}
    topic: ${LINGYI_SECKILL_TOPIC:lingyi-seckill-create-order}
    consumer-group: ${LINGYI_SECKILL_CONSUMER_GROUP:lingyi-seckill-consumer}

