server:
  port: 18080

spring:
  application:
    name: lingyi-gateway-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml?refreshEnabled=false
      - optional:nacos:common-${spring.profiles.active}.yaml?refreshEnabled=false
  nacos:
    config:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      namespace: ${NACOS_NAMESPACE:${NACOS_NAMESPACE_DEV:27119826-e1e3-481e-a1db-25eddb7f2327}}
      timeout: ${NACOS_CONFIG_TIMEOUT:10000}
      refresh-enabled: ${NACOS_CONFIG_REFRESH_ENABLED:false}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:${NACOS_NAMESPACE_DEV:27119826-e1e3-481e-a1db-25eddb7f2327}}
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:${NACOS_NAMESPACE_DEV:27119826-e1e3-481e-a1db-25eddb7f2327}}
        timeout: ${NACOS_CONFIG_TIMEOUT:10000}
        refresh-enabled: ${NACOS_CONFIG_REFRESH_ENABLED:false}
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://lingyi-user
              predicates:
                - Path=/api/user/**
            - id: product-service
              uri: lb://lingyi-product
              predicates:
                - Path=/api/product/**
            - id: cart-service
              uri: lb://lingyi-cart
              predicates:
                - Path=/api/cart/**
            - id: order-service
              uri: lb://lingyi-order
              predicates:
                - Path=/api/order/**
            - id: payment-service
              uri: lb://lingyi-payment
              predicates:
                - Path=/api/payment/**
            - id: shipment-service
              uri: lb://lingyi-shipment
              predicates:
                - Path=/api/shipment/**
            - id: review-service
              uri: lb://lingyi-review
              predicates:
                - Path=/api/review/**
            - id: seckill-service
              uri: lb://lingyi-seckill
              predicates:
                - Path=/api/seckill/**
            - id: chatbot-service
              uri: lb://lingyi-chatbot
              predicates:
                - Path=/api/chatbot/**
            - id: diagnosis-service
              uri: lb://lingyi-diagnosis
              predicates:
                - Path=/api/diagnosis/**
            - id: prompt-service
              uri: lb://lingyi-prompt
              predicates:
                - Path=/api/prompt/**
            - id: ai-admin-prompt-service
              uri: lb://lingyi-prompt
              predicates:
                - Path=/api/ai/admin/prompts/**,/api/ai/admin/prompt-categories/**
            - id: rag-service
              uri: lb://lingyi-rag
              predicates:
                - Path=/api/rag/**
            - id: ai-admin-rag-service
              uri: lb://lingyi-rag
              predicates:
                - Path=/api/ai/admin/kbs/**
            - id: config-service
              uri: lb://lingyi-config
              predicates:
                - Path=/api/config/**
            - id: job-service
              uri: lb://lingyi-job
              predicates:
                - Path=/api/job/**
            - id: notification-service
              uri: lb://lingyi-notification
              predicates:
                - Path=/api/notification/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  group-configs:
    - group: gateway
      paths-to-match: /api/**

lingyi:
  auth:
    jwt-secret: ${JWT_SECRET:lingyi-dev-secret-please-change}

