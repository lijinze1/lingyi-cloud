server:
  port: 18088

spring:
  application:
    name: lingyi-seckill
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml
      - optional:nacos:common-${spring.profiles.active}.yaml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:${NACOS_NAMESPACE_DEV:27119826-e1e3-481e-a1db-25eddb7f2327}}
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:${NACOS_NAMESPACE_DEV:27119826-e1e3-481e-a1db-25eddb7f2327}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  group-configs:
    - group: lingyi-seckill
      paths-to-match: /api/seckill/**

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:lingyi-seckill-producer}

lingyi:
  seckill:
    async-mode: ${LINGYI_SECKILL_ASYNC_MODE:local}
    topic: ${LINGYI_SECKILL_TOPIC:lingyi-seckill-create-order}
    consumer-group: ${LINGYI_SECKILL_CONSUMER_GROUP:lingyi-seckill-consumer}
    pending-timeout-seconds: ${LINGYI_SECKILL_PENDING_TIMEOUT_SECONDS:15}


